<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- ログイン済み用ヘッダー -->
<header th:fragment="header-loggedin">
    <h1>ショッピングサイト</h1>
    <nav>
        <a th:href="@{/}">ホーム</a>

        <a th:href="@{/cart/view}">
            🛒 カート
            <span id="cart-count" th:text="${cartCount} ?: 0">0</span>
        </a>

		  <!-- 👤 ユーザー名表示 -->
        <span>
            こんにちは、<span th:text="${#authentication.name}">ユーザー</span> さん
        </span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit">ログアウト</button>
        </form>
    </nav>
    <hr>
</header>

<!-- ログインページ用ヘッダー -->
<header th:fragment="header-login">
    <h1>ショッピングサイト</h1>
    <hr>
</header>

</body>
</html>
