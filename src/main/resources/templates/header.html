<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- ログイン済み用ヘッダー -->
<header th:fragment="header-loggedin">
    <h1>ショッピングサイト</h1>
    <nav>
        <a th:href="@{/}">ホーム</a>

        <a th:href="@{/cart/view}">
            🛒 カート
            <span id="cart-count" th:text="${cartCount} ?: 0">0</span>
        </a>
       
       <form th:action="@{/logout}" method="post" style="display:inline;">
    <input type="hidden"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}" />
    <button type="submit">ログアウト</button>
</form>
    </nav>
    <hr>
</header>

<!-- ログインページ用ヘッダー -->
<header th:fragment="header-login">
    <h1>ショッピングサイト</h1>
    <hr>
</header>

</body>
</html>
